# JSON Schema (Draft 2020-12) for working/sources.yaml — job board catalog.
#
# Each entry declares a `type` discriminator that determines the fetch mechanism:
#   api      — JSON API endpoint; response is parsed via array_path + field_map.
#   html     — Static HTML listings page; DOM is scraped via link_selector + link_pattern.
#   browser  — SPA / auth-walled; requires a real browser session for navigation.
#
# Conventions:
#   - One entry per job board (key = source slug).
#   - Required keys must exist; optional keys default to null / sensible value.
#   - Disabled sources stay listed (enabled: false) so their config isn't lost.

$schema: "https://json-schema.org/draft/2020-12/schema"
title: Argopia sources

type: object
additionalProperties:
  type: object
  additionalProperties: false
  required: [enabled, base_url, type]
  properties:

    # ── Common to all source types ───────────────────────────────────────────
    enabled:
      type: boolean
      description: "true: source is in scope for fetches. false: source is excluded (config preserved for re-enabling later)."

    base_url:
      type: string
      description: "Entry URL for the source. For type=api this is the endpoint; for type=html/browser this is the listings page."

    type:
      type: string
      enum: [api, html, browser]
      description: |
        Dispatch discriminator. Determines how the source's listings
        are fetched and parsed:
          api      JSON API endpoint. Response parses as JSON;
                   array_path locates the listings array; skip_first
                   and max_listings narrow scope; field_map projects
                   each item onto canonical fields (id, title, url,
                   date, company, location).
          html     Static HTML listings page. Page content parses as
                   DOM; link_selector matches anchor elements;
                   link_pattern further filters their hrefs; relative
                   URLs are absolutized via link_base; pagination drives
                   advancement until max_listings is reached.
          browser  SPA or dynamic page requiring browser navigation.
                   mcp_server drives a real browser session that
                   navigates the page, applies link_selector /
                   link_pattern / pagination, and returns matching
                   listings.

    requires_login:
      type: boolean
      default: false
      description: "true: source requires authentication; only accessible via a logged-in browser session (cookies/profile). false: source is publicly browseable; redirects to login pages indicate a misconfiguration."

    max_listings:
      type: integer
      default: 100
      description: "Hard cap on listings returned per fetch. Pagination / iteration stops once this many records have been collected."

    filter_hints:
      type: [string, "null"]
      default: null
      description: |
        Per-source prose documenting the source's URL filter syntax
        (query params, path segments, or "none" for UI-only),
        pagination mechanism, JD URL format, and access caveats
        (anti-bot, login walls, geo restrictions). Free-form since
        each source's conventions differ. Used to construct fetch
        URLs by combining base_url with applicable filter parameters.

    # ── type: api ────────────────────────────────────────────────────────────
    array_path:
      type: [string, "null"]
      default: null
      description: |
        Dot-separated key path locating the listings array within the JSON response.
          null      Response root IS the array (e.g., RemoteOK returns [...]).
          "jobs"    Top-level key (e.g., Remotive returns { jobs: [...] }).
          "data.results"  Nested keys allowed (e.g., { data: { results: [...] } }).

    skip_first:
      type: boolean
      default: false
      description: "true: drop array[0] before processing. Some APIs put metadata/legal-notice in the first element (e.g., RemoteOK). false: process all entries from index 0."

    field_map:
      type: object
      additionalProperties: false
      default: {}
      description: |
        Maps the source's JSON object keys → Argopia's canonical names.
        Each value is a dot-path navigated against the listing object.
        For example, given { "company": { "display_name": "Acme" } }:
          field_map.company = "company"               → extracts {display_name:"Acme"}  (the object)
          field_map.company = "company.display_name"  → extracts "Acme"                 (the string) ✓

        For each listing, canonical fields are extracted:
          normalized.id       = item[field_map.id]       (required)
          normalized.title    = item[field_map.title]    (required)
          normalized.url      = item[field_map.url]      (required)
          normalized.date     = item[field_map.date]     (or null if mapping is null)
          normalized.company  = item[field_map.company]  (or null)
          normalized.location = item[field_map.location] (or null)
        If any path segment is missing on an item, the normalized field
        is set to null and processing continues.
      properties:
        id:       { type: string, default: "id",       description: "Source field for the stable per-listing ID." }
        title:    { type: string, default: "title",    description: "Source field for the role title." }
        url:      { type: string, default: "url",      description: "Source field for the JD page URL." }
        date:     { type: [string, "null"], default: null, description: "Source field for posted-date (ISO 8601 if possible). null = source has no date." }
        company:  { type: [string, "null"], default: null, description: "Source field for hiring company name. null = source has no company field." }
        location: { type: [string, "null"], default: null, description: "Source field for job location. null = source has no location field." }

    # ── type: html / browser ────────────────────────────────────────────────
    link_selector:
      type: [string, "null"]
      default: null
      description: "CSS selector run against the page DOM. Each matched <a> element's href becomes a candidate JD URL."

    link_pattern:
      type: [string, "null"]
      default: null
      description: "Regex applied to each candidate href (after extraction). Hrefs that DO NOT match are dropped (filters out nav, footer, non-job links). Use anchors ($, ^) where helpful."

    link_base:
      type: [string, "null"]
      default: null
      description: |
        Origin prefix for absolutizing relative hrefs.
          null (default)  Origin is derived from base_url
                          (e.g., 'https://aijobs.net/jobs' → 'https://aijobs.net').
                          Covers most cases.
          explicit        Set when the ATS hosts JDs on a DIFFERENT origin than
                          the listings page (e.g., listings on
                          careers.company.com → JDs on apply.workable.com/company).

    pagination:
      type: string
      enum: [scroll, next-button, none]
      default: none
      description: |
        How additional pages are reached (until max_listings is satisfied):
          scroll       Source uses infinite-scroll to load additional listings.
          next-button  Source has explicit pagination controls (clickable "Next"
                       or query-string advance like ?page=N+1).
          none         Source returns all relevant listings in a single response.

    # ── type: browser only ──────────────────────────────────────────────────
    mcp_server:
      type: string
      default: playwright
      description: |
        Browser MCP server identifier used to drive the navigation
        session for type=browser sources. Defaults to playwright;
        override only if a source needs a different driver.
