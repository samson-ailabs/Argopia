# Your job-search criteria — preferences, keyword rules, role-level
# requirements. Some fields auto-fill during onboarding from your
# profile; others need your input.
# Schema: schemas/criteria.schema.yaml
#
# - Inline comments tag what auto-fills vs needs manual review.
# - Tune anything that doesn't match your actual preferences.

target:
  level: []                        # from CV title — e.g. [Senior, Staff, Lead]
  remote_only: true
  open_to_relocate: false
  preferred_timezones: []          # from candidate location — [APAC|EMEA|Americas]
  acceptable_timezones: []         # fallback regions
  excluded_companies: []           # current employer auto-appended; user adds more
  max_listing_age_days: 90
  search_queries: []               # from CV title + domain — e.g. ["ai engineer", "speech ai"]

keywords:
  positive:
    job_titles: []                 # from CV — at minimum the candidate's current title
    title_token_sets: []           # auto-derived from level × domain — e.g.
                                   # [[research, scientist, speech]] matches "Research Scientist, Speech AI"
    technical: []                  # mined from achievements — e.g. "streaming ASR", "RAG"
    tools: []                      # mined from achievements + tech_stack — e.g. "Whisper", "PyTorch"
  negative: []                     # user adds after onboarding (vocabulary collisions)

must_haves: []                     # user adds after onboarding (soft minimums)

deal_breakers:                     # universal-ish; work-auth conflicts auto-append from profile
  - equity-only or unpaid

nice_to_haves:                     # universal-ish; CV-derived signals auto-append from profile
  - compensation visible in JD or salary range disclosed
