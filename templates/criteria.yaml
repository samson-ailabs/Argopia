# Your job-search criteria — preferences, keyword rules, role-level
# requirements. Some fields auto-fill during onboarding from your
# profile; others need your input.
# Schema: schemas/criteria.schema.yaml
#
# - Inline comments tag what auto-fills vs needs manual review.
# - Tune anything that doesn't match your actual preferences.

target:
  level: []                        # seniority labels — e.g. [Senior, Staff, Lead]; from CV title
  remote_only: true
  open_to_relocate: false
  preferred_timezones: []          # region buckets — [APAC|EMEA|Americas]; from candidate location
  acceptable_timezones: []         # region buckets — [APAC|EMEA|Americas]; from candidate location
  excluded_companies: []           # current employer is appended; user adds more
  max_listing_age_days: 90         # listings older than this are out of scope
  search_queries: []               # broad terms typed into each board's search input
                                   # e.g. ["ai engineer", "ml"], ["frontend", "react"]
                                   # each entry triggers a separate fetch pass per source
                                   # precision filtering happens via keywords below

keywords:
  positive:
    job_titles: []                 # from CV — at minimum the candidate's current title
    title_token_sets: []           # list of token-sets — each set AND-matches against title
                                   # (separator-agnostic). Example:
                                   # [[research, scientist, speech]] matches "Research Scientist, Speech AI"
    technical: []                  # concept terms — e.g. "streaming ASR", "RAG"; mined from achievements
    tools: []                      # named tools — e.g. "Whisper", "PyTorch"; mined from achievements + tech_stack
  negative: []                     # domain-specific vocabulary collisions; user adds after onboarding

must_haves: []                     # subjective minimums — user adds after onboarding
                                   # e.g. "English-language work environment", "remote-first culture"

deal_breakers:                     # universal-ish defaults; work-auth conflicts auto-append from profile
  - equity-only or unpaid

nice_to_haves:                     # universal-ish defaults; CV-derived signals auto-append from profile
  - compensation visible in JD or salary range disclosed
