# Job board catalog — consumed by /argopia-scan.
# Schema: schemas/sources.schema.yaml
#
# Each entry tells the scanner where to look and how to extract listings.
# Disabled entries (enabled: false) are kept for reference; they re-enable
# as the corresponding fetch path lands (browser MCP for SPAs, logged-in
# Browser MCP for auth-walled boards).
#
# Fields (all entries share the same shape):
#   enabled        — true: scanner uses this source. false: skipped.
#   base_url       — landing/search/API page; scanner navigates here first.
#   no_auth        — true: scanner refuses any redirect to a login page.
#                    false: auth-walled board (kept for reference, with enabled: false).
#   link_selector  — CSS selector for JD anchors (HTML/SPA paths only).
#   link_pattern   — regex an extracted href must match (filters out nav / non-job links).
#   link_base      — origin prefix used to absolutize relative href values.
#   pagination     — scroll | next-button | none.
#   max_listings   — cap per scan; bounds token cost.
#   filter_hints   — free-form prose for the scan agent (board-specific quirks).
#   fetch_jd       — auto: WebFetch first, browser MCP fallback if SPA / blocked.

hn_algolia:
  enabled: true
  base_url: "https://hn.algolia.com/api/v1/search?query=Ask+HN+Who+is+hiring&tags=story,author_whoishiring&hitsPerPage=1"
  no_auth: true
  pagination: none
  max_listings: 50
  fetch_jd: auto
  filter_hints: "Latest hit is the current Who-Is-Hiring thread; its comments are individual JDs (fetched via /api/v1/items/<id>)."

remoteok:
  enabled: true
  base_url: "https://remoteok.com/"
  no_auth: true
  link_selector: 'a[href*="/remote-jobs/"]'
  link_pattern: '/remote-jobs/.+\d+$'
  link_base: "https://remoteok.com"
  pagination: scroll
  max_listings: 50
  fetch_jd: auto
  filter_hints: "Has a JSON API at /api; scan should prefer it over HTML scrape."

remotive:
  enabled: true
  base_url: "https://remotive.com/remote-jobs"
  no_auth: true
  link_selector: 'a.remotive-url-visit'
  link_pattern: '/remote-jobs/.+/.+\d+$'
  link_base: "https://remotive.com"
  pagination: none
  max_listings: 50
  fetch_jd: auto
  filter_hints: "Has a JSON API at /api/remote-jobs; HTML fallback fields kept for diagnosis."

ai_jobs_net:
  enabled: true
  base_url: "https://aijobs.net/"
  no_auth: true
  link_selector: '#job_list a[href*="/job/"]'
  link_pattern: '/job/.+\d+/?$'
  link_base: "https://aijobs.net"
  pagination: next-button
  max_listings: 50
  filter_hints: "No <time> on cards — posted-date is text 'Nd ago'. Search input at top; experience-level and remote toggles in left rail."
  fetch_jd: auto

himalayas:
  enabled: true
  base_url: "https://himalayas.app/jobs"
  no_auth: true
  link_selector: 'a[href*="/jobs/"]'
  link_pattern: '/jobs/[^/]+/[^/]+$'
  link_base: "https://himalayas.app"
  pagination: scroll
  max_listings: 50
  fetch_jd: auto

# Disabled — SPA boards that need a stealth browser MCP. Re-enable when
# browser-MCP support lands.
huggingface:
  enabled: false
  base_url: "https://apply.workable.com/huggingface/"
  no_auth: true
  link_selector: 'a[href*="/huggingface/j/"]'
  link_pattern: '/huggingface/j/[A-Z0-9]+/?$'
  link_base: "https://apply.workable.com"
  pagination: scroll
  max_listings: 50
  filter_hints: "Workable career portal. Filters in left-rail dropdowns: Department, Location, Workplace type. Search input at top."
  fetch_jd: auto

wellfound:
  enabled: false
  base_url: "https://wellfound.com/jobs"
  no_auth: true
  link_selector: 'a[href*="/jobs/"]'
  link_pattern: '/jobs/\d+'
  link_base: "https://wellfound.com"
  pagination: next-button
  max_listings: 50
  filter_hints: "Heavy anti-bot (Cloudflare). Role/tech filters use typeahead inputs. Job-detail URLs follow /jobs/<numeric-id>-<slug>."
  fetch_jd: auto

welcome_to_the_jungle:
  enabled: false
  base_url: "https://www.welcometothejungle.com/en/jobs"
  no_auth: true
  link_selector: 'a[href*="/jobs/"]'
  link_pattern: '/companies/[^/]+/jobs/[^/]+$'
  link_base: "https://www.welcometothejungle.com"
  pagination: next-button
  max_listings: 50
  fetch_jd: auto

# Disabled — auth-walled boards that need a logged-in Browser MCP session.
linkedin:
  enabled: false
  base_url: "https://www.linkedin.com/jobs/search/"
  no_auth: false
  filter_hints: "Experience level enum: Entry level, Associate, Mid-Senior level, Director, Executive. Date posted: 24 hours / week / month. Remote/Hybrid/On-site under 'Workplace type'."

ycombinator:
  enabled: false
  base_url: "https://www.workatastartup.com/companies"
  no_auth: false
  filter_hints: "Filters: Role type, Interest, Company stage. Search field at top."

itviec:
  enabled: false
  base_url: "https://itviec.com/it-jobs"
  no_auth: false
  filter_hints: "Vietnam-only board; filter by Working Arrangement: Remote, location, experience level."
