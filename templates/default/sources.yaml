# Job board catalog — consumed by /argopia-scan.
# Schema: schemas/sources.schema.yaml
#
# Each entry declares a `type` discriminator:
#   api      — JSON API; scan reads array_path + field_map
#   html     — Static HTML; scan reads link_selector + link_pattern
#   browser  — SPA / auth-walled; scan delegates to a browser MCP
#
# Disabled entries (enabled: false) are kept for reference; they re-enable
# as the corresponding fetch path lands (browser MCP for SPAs / auth-walled,
# API-key wiring for aggregators).

# ── JSON API sources ──

remoteok:
  enabled: false
  base_url: "https://remoteok.com/api"
  type: api
  max_listings: 100
  skip_first: true
  field_map:
    title: position
    date: date
    company: company
    location: location
  filter_hints: "~99 jobs/call (single response, ~9-day window). URL filter: append ?tags=ml,ai,audio (comma-separated) to base_url for tag-based pre-filter."

remotive:
  enabled: false
  base_url: "https://remotive.com/api/remote-jobs"
  type: api
  max_listings: 100
  array_path: jobs
  field_map:
    date: publication_date
    company: company_name
    location: candidate_required_location
  filter_hints: "Free /api/remote-jobs serves only ~23 listings (public preview). Full database (~2.6K new/day) is paywalled at $7-29/mo — keep disabled until subscribed."

# ── Static HTML sources ──

aijobs_net:
  enabled: true
  base_url: "https://aijobs.net/"
  type: html
  max_listings: 100
  link_selector: '#job_list a[href*="/job/"]'
  link_pattern: '/job/[^/]+\d+/?$'
  pagination: next-button
  filter_hints: "50 jobs/page, paginates via ?page=N (2 pages cover max_listings: 100). URL filter: none (UI-only — search input, left-rail toggles). Posted-date shown as 'Nd ago' text (no datetime element)."

aijobs_ai:
  enabled: true
  base_url: "https://aijobs.ai/remote"
  type: html
  max_listings: 100
  link_selector: 'a[href*="/job/"]'
  link_pattern: '/job/[^/]+/?$'
  pagination: next-button
  filter_hints: "~21 jobs/page, paginates via ?page=N. URL filter: ?job_type=Full%20Time for FT-only. Distinct platform from ai-jobs.net (both shipped enabled by default)."

himalayas:
  enabled: true
  base_url: "https://himalayas.app/jobs"
  type: html
  max_listings: 100
  link_selector: 'a[href*="/companies/"][href*="/jobs/"]'
  link_pattern: '/companies/[^/]+/jobs/[^/]+/?$'
  pagination: next-button
  filter_hints: "~20 jobs/page, paginates via ?page=N. URL filter: /jobs/<seniority|skill|employment-type> (e.g. /jobs/senior, /jobs/python, /jobs/full-time). Anti-bot: direct HTTP 403s, WebFetch passes."

topdev:
  enabled: false
  base_url: "https://topdev.vn/jobs/search"
  type: html
  max_listings: 100
  link_selector: 'a[href*="/detail-jobs/"]'
  link_pattern: '/detail-jobs/[^/]+-\d+/?$'
  pagination: next-button
  filter_hints: "VN-local. URL filter: ?keyword=<term>&page=N. JD URL format: /detail-jobs/<title-slug>-<company-slug>-<numeric-id>. Loose keyword matching (returns UI/UX, QC, content roles alongside AI). VN-employer-skewed (FPT, banks, telecom) — useful as VN-local fallback."

# ── Disabled — SPA boards needing stealth browser MCP ──

itviec:
  enabled: false
  base_url: "https://itviec.com/viec-lam-it"
  type: browser
  max_listings: 100
  link_selector: 'a[href*="job_selected="]'
  link_pattern: '/viec-lam-it/[^?]+\?job_selected=[^&]+'
  pagination: next-button
  filter_hints: "VN-local. URL filter: /viec-lam-it/<role>[/<city>] (e.g. /viec-lam-it/ai-engineer/ha-noi). JD revealed on listing page via ?job_selected=<slug> query (atypical). International remote-friendly employers (CodeLink, Money Forward). Anti-bot: WebFetch 403s, needs stealth browser MCP."

glassdoor:
  enabled: false
  base_url: "https://www.glassdoor.com/Job/jobs.htm"
  type: browser
  max_listings: 100
  link_selector: 'a[href*="jobListingId="]'
  link_pattern: '/partner/jobListing\.htm\?[^"]*jobListingId=\d+'
  pagination: next-button
  filter_hints: "URL filter: opaque (/Job/<slug>-jobs-SRCH_IL.0,6_IS<location-id>_KO<offset>,<len>.htm) — browser MCP should drive the UI search form (keyword + location) rather than construct URLs. JD URL format: /partner/jobListing.htm?jobListingId=<numeric-id>. Browsing is public; 'Sign in to apply' gates only the apply action. Anti-bot: WebFetch 403s, needs stealth browser MCP."

# ── Disabled — auth-walled boards (need a logged-in browser session) ──

linkedin:
  enabled: false
  base_url: "https://www.linkedin.com/jobs/search/"
  type: browser
  requires_login: true
  max_listings: 100
  link_selector: 'a[href*="/jobs/view/"]'
  link_pattern: '/jobs/view/\d+/?'
  pagination: next-button
  filter_hints: "URL filter: ?keywords=<term>&location=<loc>&f_E=<level>&f_TPR=<time>&f_WT=<workplace>. Filter IDs: f_E 2-6 (Entry→Executive), f_TPR r86400/r604800/r2592000 (24h/week/month), f_WT 1=On-site, 2=Remote, 3=Hybrid. JD URL format: /jobs/view/<numeric-id>/. Login required for full search depth and Easy Apply; public preview is shallow."

indeed:
  enabled: false
  base_url: "https://www.indeed.com/jobs"
  type: browser
  requires_login: true
  max_listings: 100
  link_selector: 'a[href*="jk="]'
  link_pattern: '[?&]jk=[a-f0-9]+'
  pagination: next-button
  filter_hints: "URL filter: ?q=<term>&l=<location>&start=<offset> (e.g. ?q=ai+engineer&l=Remote&start=10). JD URL format: /rc/clk?jk=<hash> (redirect tracker) → /viewjob?jk=<hash>. Page 1 is publicly accessible; page 2+ redirects to /auth?from=page-two-signin — login required for full coverage. US-skewed on .com (use vn.indeed.com for VN-local). Known issue: scraper spam dilutes results."
