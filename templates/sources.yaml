# Your job board catalog — which boards Argopia crawls and how. Ships
# with a curated set; tune `enabled` per entry to adjust scope.
# Schema: schemas/sources.schema.yaml
#
# - Each entry's `type` determines fetch path:
#     api      — JSON endpoint
#     html     — static HTML listings
#     browser  — SPA / auth-walled (browser MCP)
# - Disabled entries stay listed (`enabled: false`) so their config
#   isn't lost; flip true when the fetch path is ready.

# ── JSON API sources ──

remoteok:
  enabled: false
  base_url: "https://remoteok.com/api"
  type: api
  max_listings: 100
  skip_first: true
  field_map:
    title: position
    date: date
    company: company
    location: location
  filter_hints: "Single response, ~99 jobs/call (~9-day window). URL filter: ?tags=ml,ai,audio (comma-separated) for tag-based pre-filter. JD URL format: /remote-jobs/<title-slug>-<company-slug>-<numeric-id>."

remotive:
  enabled: false
  base_url: "https://remotive.com/api/remote-jobs"
  type: api
  max_listings: 100
  array_path: jobs
  field_map:
    date: publication_date
    company: company_name
    location: candidate_required_location
  filter_hints: "Single response, ~23 listings on free tier (public preview); full database (~2.6K new/day) is paywalled at $7-29/mo. URL filter: limited on free tier (?category=, ?company=, ?search=). JD URL format: source-provided in JSON `url` field. Caveat: paywall — keep disabled until subscribed."

# ── Static HTML sources ──

aijobs_net:
  enabled: true
  base_url: "https://aijobs.net/"
  type: html
  max_listings: 100
  link_selector: '#job_list a[href*="/job/"]'
  link_pattern: '/job/[^/]+\d+/?$'
  pagination: next-button
  filter_hints: "50 jobs/page, paginates via ?page=N. URL filter: none — UI-only via structured dropdowns; ?q= is ignored. JD URL format: /job/<title-slug>-<numeric-id>/. Posted-date shown as 'Nd ago' text (no datetime element)."

aijobs_ai:
  enabled: true
  base_url: "https://aijobs.ai/remote"
  type: html
  max_listings: 100
  link_selector: 'a[href*="/job/"]'
  link_pattern: '/job/[^/]+/?$'
  pagination: next-button
  filter_hints: "~21 jobs/page, paginates via ?page=N. URL filters: ?keyword=<term> for free-text search; ?job_type=Full%20Time for FT-only. JD URL format: /job/<title-slug>."

himalayas:
  enabled: true
  base_url: "https://himalayas.app/jobs/worldwide"
  type: html
  max_listings: 100
  link_selector: 'a[href*="/companies/"][href*="/jobs/"]'
  link_pattern: '/companies/[^/]+/jobs/[^/]+/?$'
  pagination: next-button
  filter_hints: "~20 jobs/page, paginates via ?page=N. URL filter: ?q=<term> for free-text search. JD URL format: /companies/<company-slug>/jobs/<title-slug>. Anti-bot: direct HTTP 403s, WebFetch passes."

topdev:
  enabled: false
  base_url: "https://topdev.vn/jobs/search"
  type: html
  max_listings: 100
  link_selector: 'a[href*="/detail-jobs/"]'
  link_pattern: '/detail-jobs/[^/]+-\d+/?$'
  pagination: next-button
  filter_hints: "~10-15 jobs/page, paginates via &page=N. URL filter: ?keyword=<term> for free-text search. JD URL format: /detail-jobs/<title-slug>-<company-slug>-<numeric-id>. Caveat: VN-local market with loose keyword matching (returns UI/UX, QC, content roles alongside AI); VN-employer-skewed (FPT, banks, telecom)."

# ── Disabled — SPA boards needing stealth browser MCP ──

itviec:
  enabled: false
  base_url: "https://itviec.com/viec-lam-it"
  type: browser
  max_listings: 100
  link_selector: 'a[href*="job_selected="]'
  link_pattern: '/viec-lam-it/[^?]+\?job_selected=[^&]+'
  pagination: next-button
  filter_hints: "Pagination unverified (anti-bot blocks WebFetch). URL filter: /viec-lam-it/<role>[/<city>] (e.g. /viec-lam-it/ai-engineer/ha-noi). JD URL format: <listing-path>?job_selected=<slug> (revealed on listing page; atypical). Caveats: VN-local with international remote-friendly employers (CodeLink, Money Forward); anti-bot WebFetch 403s, needs stealth browser MCP."

glassdoor:
  enabled: false
  base_url: "https://www.glassdoor.com/Job/jobs.htm"
  type: browser
  max_listings: 100
  link_selector: 'a[href*="jobListingId="]'
  link_pattern: '/partner/jobListing\.htm\?[^"]*jobListingId=\d+'
  pagination: next-button
  filter_hints: "Pagination unverified (anti-bot blocks WebFetch). URL filter: opaque (/Job/<slug>-jobs-SRCH_IL.0,6_IS<location-id>_KO<offset>,<len>.htm) — drive UI search form rather than construct URLs. JD URL format: /partner/jobListing.htm?jobListingId=<numeric-id>. Caveats: browsing is public, 'Sign in to apply' gates apply action; anti-bot WebFetch 403s, needs stealth browser MCP."

# ── Disabled — auth-walled boards (need a logged-in browser session) ──

linkedin:
  enabled: false
  base_url: "https://www.linkedin.com/jobs/search/"
  type: browser
  requires_login: true
  max_listings: 100
  link_selector: 'a[href*="/jobs/view/"]'
  link_pattern: '/jobs/view/\d+/?'
  pagination: next-button
  filter_hints: "~25 jobs/page, paginates via &start=<offset> (multiples of 25). URL filter: ?keywords=<term>&location=<loc>&f_E=<level>&f_TPR=<time>&f_WT=<workplace>. Filter IDs: f_E 2-6 (Entry→Executive), f_TPR r86400/r604800/r2592000 (24h/week/month), f_WT 1=On-site, 2=Remote, 3=Hybrid. JD URL format: /jobs/view/<numeric-id>/. Caveat: login required for full search depth and Easy Apply; public preview is shallow."

indeed:
  enabled: false
  base_url: "https://www.indeed.com/jobs"
  type: browser
  requires_login: true
  max_listings: 100
  link_selector: 'a[href*="jk="]'
  link_pattern: '[?&]jk=[a-f0-9]+'
  pagination: next-button
  filter_hints: "~10-15 jobs/page, paginates via &start=<offset> (multiples of 10). URL filter: ?q=<term>&l=<location>. JD URL format: /rc/clk?jk=<hash> (redirect tracker) → /viewjob?jk=<hash>. Caveats: page 1 publicly accessible, page 2+ redirects to /auth?from=page-two-signin (login required for full coverage); US-skewed on .com (use vn.indeed.com for VN-local); scraper spam dilutes results."
